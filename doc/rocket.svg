<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Screen Launcher rocket">
  <defs>
    <linearGradient id="body" x1="64" y1="10" x2="64" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9EDF5"/>
    </linearGradient>
    <linearGradient id="fin" x1="64" y1="58" x2="64" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF9800"/>
      <stop offset="1" stop-color="#F4511E"/>
    </linearGradient>
    <linearGradient id="flame" x1="64" y1="100" x2="64" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD54F"/>
      <stop offset="1" stop-color="#FF7043"/>
    </linearGradient>
  </defs>

  <!-- tilt the whole rocket to a ~35° launch angle -->
  <g transform="rotate(35 64 64)">
    <!-- exhaust flame -->
    <path d="M64 102c6 6 9 12 9 17 0 4-4 7-9 7s-9-3-9-7c0-5 3-11 9-17z" fill="url(#flame)"/>

    <!-- side fins -->
    <path d="M44 64c-9 5-15 14-16 27 9-2 16-6 21-12 0-6-2-11-5-15z" fill="url(#fin)"/>
    <path d="M84 64c9 5 15 14 16 27-9-2-16-6-21-12 0-6 2-11 5-15z" fill="url(#fin)"/>

    <!-- rocket body with rounded nose -->
    <path d="M64 8c14 14 22 34 22 60 0 14-4 28-11 38-3 5-19 5-22 0-7-10-11-24-11-38C42 42 50 22 64 8z" fill="url(#body)" stroke="#C7CEDB" stroke-width="2"/>

    <!-- window -->
    <circle cx="64" cy="50" r="13" fill="#6C63FF"/>
    <circle cx="64" cy="50" r="13" fill="none" stroke="#FFFFFF" stroke-width="4"/>
    <circle cx="59" cy="45" r="4" fill="#FFFFFF" opacity="0.7"/>
  </g>
</svg>
